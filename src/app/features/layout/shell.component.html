<div class="shell" [class.collapsed]="!sidebarExpanded()">
  <aside class="sidebar" [class.open]="menuOpen()">
    <div class="brand">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#BrandGradient)" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="BrandGradient" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
            <stop stop-color="#38bdf8"/>
            <stop offset="1" stop-color="#818cf8"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-text">ORÇA-SOLU</span>
    </div>

    <nav>
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        (click)="closeMenu()"
      >
        <div class="menu-icon" [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'dashboard'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <svg *ngSwitchCase="'ordens'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <svg *ngSwitchCase="'produtos'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          <svg *ngSwitchCase="'categorias'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        </div>
        <span class="menu-text">{{ item.label }}</span>
      </a>
    </nav>

    <!-- Removed bottom sidebar toggle to avoid duplication -->
  </aside>

  <div class="overlay" *ngIf="menuOpen()" (click)="closeMenu()"></div>

  <section class="content">
    <header class="topbar bg-white dark:bg-gray-800 shadow relative z-10 transition-colors">
      <div class="topbar-left" style="display: flex; align-items: center; gap: 1rem;">
        <!-- Mobile Menu Toggle -->
        <button class="menu-btn md:hidden" (click)="toggleMenu()">☰</button>

        <!-- Desktop Sidebar Toggle -->
        <button
          (click)="toggleSidebar()"
          class="hidden md:flex items-center justify-center p-2 rounded-md bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition-colors border-none cursor-pointer"
          title="Alternar Menu"
        >
          <svg *ngIf="sidebarExpanded()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
          <svg *ngIf="!sidebarExpanded()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
        </button>

        <h2 class="text-xl font-bold m-0 text-gray-800 dark:text-white">Orçamento de Impressão</h2>
      </div>

      <div class="topbar-right">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-800 font-bold text-xl shrink-0">
            {{ (authService.currentSession()?.fullName || 'J')[0] | uppercase }}
          </div>
          <div class="flex flex-col text-left justify-center">
            <span class="text-lg font-medium text-black dark:text-white leading-none">{{ authService.currentSession()?.fullName || 'Joao macondo' }}</span>
            <span class="text-base text-black dark:text-gray-300 leading-tight mt-1">{{ authService.currentSession()?.email || 'joaomacondo@gmail.com' }}</span>
          </div>
        </div>

        <button class="logout ml-5 hover:shadow-lg hover:shadow-red-500/30" (click)="logout()">Sair</button>
      </div>
    </header>

    <main>
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
